<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 福岡自駕遊小幫手</title>
    <!-- 載入 React, Babel 與 Tailwind CSS CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 資料庫 (由 CSV 分析擴充) ---
        const tripData = {
            itinerary: [
                {
                    day: 1, date: "8/22", weekday: "Sat", weather: "☀️ 晴天 32°C",
                    events: [
                        { type: "transit", time: "06:30", title: "機場接送 (含增高墊)", detail: "前往桃園機場 Terminal 1" },
                        { type: "flight", time: "09:35", title: "星宇航空 JX840", detail: "09:35 TPE ✈️ 13:05 FUK (玉山世界卡)", location: "Fukuoka Airport" },
                        { type: "transit", time: "14:00", title: "福岡機場取車", detail: "辦理租車手續", location: "Fukuoka Airport Rental Car" },
                        { type: "transit", time: "15:00", title: "開車前往大分", detail: "車程約 2 小時", location: "Oita" },
                        { type: "food", time: "18:00", title: "大分市區晚餐", tips: [{ text: "必吃美食：大分雞肉天婦羅 (とり天)、豐後牛", type: "food" }], location: "Oita Station" },
                        { type: "hotel", time: "20:00", title: "入住：ホテル日航大分", detail: "飯店停車費 1000円", location: "ホテル日航大分 オアシスタワー" }
                    ]
                },
                {
                    day: 2, date: "8/23", weekday: "Sun", weather: "🌤️ 多雲 30°C",
                    events: [
                        { type: "food", time: "08:00", title: "飯店早餐", detail: "吃飽準備出發！" },
                        { type: "transit", time: "09:30", title: "開車前往海之卵水族館", location: "Umitamago" },
                        { type: "attraction", time: "10:00", title: "海之卵水族館 (Umitamago)", tips: [{ text: "海豚表演與海象互動必看！", type: "info" }], location: "Umitamago" },
                        { type: "food", time: "12:30", title: "午餐時間", location: "Beppu" },
                        { type: "transit", time: "14:00", title: "開車前往別府地獄", location: "Beppu Hells" },
                        { type: "attraction", time: "14:30", title: "別府地獄組合", detail: "海地獄、血池地獄、鬼石坊主地獄", tips: [{ text: "必買伴手禮：湯之花入浴劑", type: "buy" }, { text: "必吃美食：地獄蒸布丁、溫泉蛋", type: "food" }], location: "Umi Jigoku" },
                        { type: "food", time: "18:00", title: "別府市區晚餐", tips: [{ text: "必吃美食：別府冷麵、地獄蒸料理", type: "food" }], location: "Beppu Station" },
                        { type: "hotel", time: "20:00", title: "入住：御宿 野乃別府", detail: "飯店停車費 1200円 (別府八湯)", tips: [{ text: "晚上有免費宵夜拉麵可享用！", type: "info" }], location: "御宿 野乃別府" }
                    ]
                },
                {
                    day: 3, date: "8/24", weekday: "Mon", weather: "☀️ 晴天 33°C",
                    events: [
                        { type: "food", time: "08:00", title: "飯店早餐", detail: "" },
                        { type: "food", time: "12:00", title: "午餐時間", location: "Beppu" },
                        { type: "transit", time: "14:00", title: "開車前往九州自然動物園", location: "African Safari Oita" },
                        { type: "attraction", time: "15:00", title: "九州自然動物園 (African Safari)", tips: [{ text: "重要：已提前預約 15:00 叢林巴士", type: "alert" }], location: "African Safari Oita" },
                        { type: "transit", time: "17:00", title: "開車前往由布院", detail: "車程約 30 分鐘", location: "Yufuin" },
                        { type: "hotel", time: "17:40", title: "入住：ゆふいんホテル秀峰館", detail: "和室12畳｜由布岳View", tips: [{ text: "重要預約：晚餐務必於 18:00 前抵達飯店！", type: "alert" }], location: "ゆふいんホテル秀峰館" },
                        { type: "food", time: "18:30", title: "飯店晚餐", detail: "享受溫泉飯店會席料理" }
                    ]
                },
                {
                    day: 4, date: "8/25", weekday: "Tue", weather: "⛅ 陰天 28°C",
                    events: [
                        { type: "food", time: "08:00", title: "飯店早餐", detail: "悠閒享用早餐" },
                        { type: "transit", time: "09:30", title: "開車：由布院 → 黑川溫泉", tips: [{ text: "沿途山路請小心駕駛", type: "info" }], location: "Kurokawa Onsen" },
                        { type: "food", time: "12:00", title: "黑川溫泉午餐", tips: [{ text: "必吃美食：黑川溫泉泡芙、銅鑼燒", type: "food" }], location: "Kurokawa Onsen" },
                        { type: "transit", time: "14:30", title: "開車：黑川溫泉 → 高千穗", location: "Takachiho Gorge" },
                        { type: "food", time: "17:00", title: "提早採買晚餐/消夜", tips: [{ text: "高千穗晚上餐廳較早關，建議先買好食物", type: "info" }], location: "Takachiho" },
                        { type: "hotel", time: "18:00", title: "入住：グレイトフル高千穂", location: "ホテル グレイトフル高千穂" }
                    ]
                }
            ],
            tools: {
                emergency: [
                    { name: "報警", phone: "110" },
                    { name: "救護車/消防", phone: "119" },
                    { name: "台北駐福岡經濟文化辦事處", phone: "092-734-2810" }
                ],
                budget: { total: "44,742 NTD (已付估算)", items: ["住宿費用大宗", "租車與交通費用", "餐飲與購物未計"] },
                shopping: [
                    { category: "藥妝", items: ["DHC 維他命C/D", "DHC 藍莓精華", "Minon UV防曬乳", "Travelmin 暈車藥 (葡萄/檸檬)"] },
                    { category: "食品", items: ["茅乃舍 蒸蛋粉", "茅乃舍 白芝麻醬"] },
                    { category: "服飾配件", items: ["Montbell 童帽/男帽", "Montbell 兒童涼鞋", "Global Work 服飾", "Hoka 鞋款"] }
                ]
            }
        };

        function App() {
            const [activeTab, setActiveTab] = useState('itinerary');

            const openMap = (query) => {
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(query)}`, '_blank');
            };

            const getEventStyle = (type) => {
                switch(type) {
                    case 'transit': return { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', icon: '🚗' };
                    case 'flight': return { bg: 'bg-blue-100', border: 'border-blue-300', text: 'text-blue-800', icon: '✈️' };
                    case 'food': return { bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-700', icon: '🍴' };
                    case 'attraction': return { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-700', icon: '📍' };
                    case 'hotel': return { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-700', icon: '🛏️' };
                    default: return { bg: 'bg-gray-50', border: 'border-gray-200', text: 'text-gray-700', icon: 'ℹ️' };
                }
            };

            const getTagStyle = (type) => {
                switch(type) {
                    case 'alert': return "bg-red-100 text-red-700 border-red-300 font-bold";
                    case 'food': return "bg-orange-100 text-orange-700 border-orange-200 font-bold";
                    case 'buy': return "bg-yellow-100 text-yellow-700 border-yellow-300 font-bold";
                    case 'info': return "bg-teal-50 text-teal-700 border-teal-200";
                    default: return "bg-gray-100 text-gray-700";
                }
            };

            return (
                <div className="min-h-screen bg-[#F9F7F3] font-sans text-gray-800 flex justify-center">
                    <div className="w-full max-w-md bg-white min-h-screen shadow-2xl relative flex flex-col pb-20 overflow-x-hidden">
                        
                        <header className="bg-[#E9F1EC] pt-12 pb-4 px-6 sticky top-0 z-10 shadow-sm rounded-b-3xl">
                            <h1 className="text-2xl font-black text-[#2C4A3B] tracking-wide">
                                2026 九州福岡自駕遊 🚗
                            </h1>
                            <p className="text-sm text-[#5D806D] mt-1 font-medium">Have a safe and fun trip!</p>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 space-y-6">
                            {activeTab === 'itinerary' && (
                                <div className="space-y-8">
                                    {tripData.itinerary.map((dayData, index) => (
                                        <section key={index} className="relative">
                                            <div className="flex items-center justify-between mb-4 sticky top-[80px] bg-white/90 backdrop-blur-sm z-10 py-2 rounded-xl px-2 shadow-sm border border-gray-100">
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-xl font-bold text-gray-800">Day {dayData.day}</span>
                                                    <span className="text-sm text-gray-500 font-medium">{dayData.date} ({dayData.weekday})</span>
                                                </div>
                                                <div className="flex items-center gap-1.5 text-sm font-bold text-sky-600 bg-sky-50 px-3 py-1 rounded-full">
                                                    {dayData.weather}
                                                </div>
                                            </div>

                                            <div className="space-y-4 ml-2 border-l-2 border-green-100 pl-4 py-2">
                                                {dayData.events.map((ev, i) => {
                                                    const style = getEventStyle(ev.type);
                                                    return (
                                                        <div key={i} className={`relative p-4 rounded-2xl border ${style.bg} ${style.border} shadow-sm`}>
                                                            <div className={`absolute -left-[25px] top-5 w-3 h-3 rounded-full bg-white border-2 ${style.border}`}></div>
                                                            <div className="flex justify-between items-start mb-2">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-xl">{style.icon}</span>
                                                                    <h3 className={`font-bold text-lg ${style.text}`}>{ev.title}</h3>
                                                                </div>
                                                                {ev.time && <span className="text-sm font-bold text-gray-500 bg-white/60 px-2 py-0.5 rounded-lg">{ev.time}</span>}
                                                            </div>
                                                            {ev.detail && <p className="text-gray-600 text-sm mb-2">{ev.detail}</p>}
                                                            {ev.tips && (
                                                                <div className="mt-3 space-y-2">
                                                                    {ev.tips.map((tip, idx) => (
                                                                        <div key={idx} className={`text-xs px-3 py-2 rounded-xl border flex items-start gap-1.5 ${getTagStyle(tip.type)}`}>
                                                                            {tip.type === 'alert' && <span className="mt-0.5 shrink-0">⚠️</span>}
                                                                            {tip.type === 'food' && <span className="mt-0.5 shrink-0">🍜</span>}
                                                                            {tip.type === 'buy' && <span className="mt-0.5 shrink-0">🛍️</span>}
                                                                            <span>{tip.text}</span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                            {ev.location && (
                                                                <button onClick={() => openMap(ev.location)} className="mt-4 w-full flex items-center justify-center gap-2 bg-white/80 hover:bg-white text-blue-600 font-bold py-2.5 rounded-xl border border-blue-200 shadow-sm active:scale-95 transition-transform">
                                                                    <span>🧭</span>導航前往
                                                                </button>
                                                            )}
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </section>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'tools' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                                        <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4"><span>✈️</span> 航班資訊</h2>
                                        <div className="bg-blue-50 p-4 rounded-2xl">
                                            <div className="flex justify-between items-center text-blue-900">
                                                <div className="text-center"><p className="text-2xl font-black">TPE</p><p className="text-xs font-bold mt-1">09:35</p></div>
                                                <div className="flex-1 px-4 relative flex items-center justify-center">
                                                    <div className="border-t-2 border-blue-300 border-dashed w-full"></div>
                                                    <span className="absolute text-blue-400">✈️</span>
                                                </div>
                                                <div className="text-center"><p className="text-2xl font-black">FUK</p><p className="text-xs font-bold mt-1">13:05</p></div>
                                            </div>
                                            <p className="text-center text-sm font-bold text-blue-700 mt-3 pt-3 border-t border-blue-200">星宇航空 JX840</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                                        <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4"><span>🛍️</span> 購物清單</h2>
                                        <div className="space-y-4">
                                            {tripData.tools.shopping.map((cat, i) => (
                                                <div key={i}>
                                                    <h3 className="text-sm font-bold text-pink-700 mb-2 bg-pink-50 px-3 py-1 rounded-lg inline-block">{cat.category}</h3>
                                                    <ul className="space-y-2 pl-1">
                                                        {cat.items.map((item, j) => (
                                                            <li key={j} className="flex items-center gap-2 text-sm text-gray-600">✅ {item}</li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                                        <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4"><span>💰</span> 預算概覽</h2>
                                        <div className="bg-green-50 p-4 rounded-2xl">
                                            <p className="text-sm text-green-700 font-bold mb-1">已記錄總計 (NTD)</p>
                                            <p className="text-3xl font-black text-green-800">{tripData.tools.budget.total}</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-red-100">
                                        <h2 className="text-lg font-bold text-red-600 flex items-center gap-2 mb-4"><span>⚠️</span> 緊急聯絡電話</h2>
                                        <div className="space-y-3">
                                            {tripData.tools.emergency.map((em, i) => (
                                                <a key={i} href={`tel:${em.phone}`} className="flex items-center justify-between p-3 rounded-xl bg-red-50 hover:bg-red-100">
                                                    <span className="font-bold text-red-800">{em.name}</span>
                                                    <div className="flex items-center gap-2 text-red-600 font-bold bg-white px-3 py-1 rounded-full shadow-sm">📞 {em.phone}</div>
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        <nav className="absolute bottom-0 w-full bg-white border-t border-gray-100 shadow-[0_-10px_20px_rgba(0,0,0,0.03)] pb-safe">
                            <div className="flex justify-around items-center p-3">
                                <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center gap-1.5 w-20 py-2 rounded-2xl ${activeTab === 'itinerary' ? 'bg-[#E9F1EC] text-[#2C4A3B]' : 'text-gray-400'}`}>
                                    <span className={`text-2xl ${activeTab === 'itinerary' ? '' : 'opacity-40 grayscale'}`}>📍</span>
                                    <span className="text-[11px] font-bold">行程表</span>
                                </button>
                                <button onClick={() => setActiveTab('tools')} className={`flex flex-col items-center gap-1.5 w-20 py-2 rounded-2xl ${activeTab === 'tools' ? 'bg-[#E9F1EC] text-[#2C4A3B]' : 'text-gray-400'}`}>
                                    <span className={`text-2xl ${activeTab === 'tools' ? '' : 'opacity-40 grayscale'}`}>🛍️</span>
                                    <span className="text-[11px] font-bold">小工具</span>
                                </button>
                            </div>
                        </nav>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
